---
# MutatingWebhookConfiguration — the API server calls /mutate for every Pod
# CREATE/UPDATE before running the validating webhook.  The mutator patches
# pods toward compliance using sc.dsmlp.ucsd.edu/default.* namespace
# annotations; the validating webhook then performs the final accept/reject.
#
# ORDERING NOTE: Kubernetes runs mutating webhooks before validating webhooks.
#
# caBundle / cert-manager: see notes in webhook.yaml.
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: pod-security-webhook
  # Uncomment if using cert-manager CA injector:
  # annotations:
  #   cert-manager.io/inject-ca-from: tgptinf-system/pod-security-webhook-cert
spec:
  webhooks:
    - name: mutate.pod-security.tritonai.io
      admissionReviewVersions: ["v1"]
      sideEffects: None
      # Allow pods through even if the webhook is temporarily unavailable.
      # The validating webhook (failurePolicy: Fail) will still block non-
      # compliant pods; the mutating webhook being down only means defaults
      # won't be applied automatically.
      failurePolicy: Ignore
      timeoutSeconds: 10
      clientConfig:
        service:
          name: pod-security-webhook
          namespace: tgptinf-system
          path: /mutate
          port: 443
        # Replace with base64-encoded CA certificate that signed the TLS cert.
        caBundle: <BASE64_ENCODED_CA_CRT>
      rules:
        - apiGroups: [""]
          apiVersions: ["v1"]
          operations: ["CREATE", "UPDATE"]
          resources: ["pods"]
          scope: "Namespaced"
      namespaceSelector:
        matchExpressions:
          - key: kubernetes.io/metadata.name
            operator: NotIn
            values:
              - tgptinf-system
              - kube-system
          - key: mutator.sc.dsmlp.ucsd.edu
            operator: In
            values:
            - enabled
      # Only mutate pods that do not yet have the webhook's own annotation
      # (prevents re-mutation of already-processed pods on UPDATE)
      objectSelector:
        matchExpressions:
          - key: pod-security.tritonai.io/mutated
            operator: DoesNotExist
