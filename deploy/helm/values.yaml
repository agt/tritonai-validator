# ---------------------------------------------------------------------------
# pod-security-webhook Helm chart values
# Install into the dedicated system namespace:
#   helm install pod-security-webhook ./deploy/helm -n tgptinf-system --create-namespace
# ---------------------------------------------------------------------------

# Override the chart name used in resource names and labels.
# Leave empty to use the chart name (pod-security-webhook).
nameOverride: "tgptinf-pod-security-webhook"
# Override the fully-qualified resource name (Deployment, Service, …).
# Leave empty to derive it from nameOverride / chart name.
fullnameOverride: ""

# Annotation prefix used for all webhook namespace annotations.
# Must match the ANNOTATION_PREFIX env var set on the webhook Deployment.
annotationPrefix: tritonai-admission-webhook

replicaCount: 2

image:
  repository: ghcr.io/agt/tritonai-admission-webhook
  tag: 20260308v2
  pullPolicy: Always

logLevel: DEBUG

resources:
  requests:
    cpu: "50m"
    memory: "64Mi"
  limits:
    cpu: "200m"
    memory: "128Mi"

tls:
  # Base64-encoded CA certificate that signed the TLS cert presented by the
  # webhook server.  Required by both webhook configurations.
  # Generate with:  base64 -w0 ca.crt
  caBundle: ""

  # cert-manager CA injector: set to "<namespace>/<Certificate-name>" to have
  # cert-manager populate caBundle automatically, e.g.:
  #   certManagerAnnotation: "tgptinf-system/pod-security-webhook-cert"
  # Leave empty to manage caBundle manually via tls.caBundle above.
  certManagerAnnotation: ""

webhook:
  mutating:
    # Ignore keeps pods flowing when the mutating webhook is temporarily down.
    # The validating webhook (failurePolicy: Fail) still blocks non-compliant pods.
    failurePolicy: Ignore
    timeoutSeconds: 10

  validating:
    # Fail rejects pods if the validating webhook is unreachable.
    failurePolicy: Fail
    timeoutSeconds: 10

  # Namespaces (in addition to helm deploy namespace) excluded from both webhook configurations
  excludedNamespaces:
    - kube-system

rbac:
  # ClusterRole and ClusterRoleBinding are cluster-scoped; names must be
  # globally unique across the cluster.
  clusterRoleName: tgptinf-pod-security-webhook
