# TLS certificate for the webhook server.
# Populate tls.crt and tls.key in values.yaml with base64-encoded material,
# or use cert-manager to provision and rotate the certificate automatically
# (set tls.certManagerAnnotation and leave tls.crt / tls.key empty).
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "pod-security-webhook.tlsSecretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "pod-security-webhook.labels" . | nindent 4 }}
type: kubernetes.io/tls
data:
  # base64 -w0 tls.crt
  tls.crt: {{ .Values.tls.crt | quote }}
  # base64 -w0 tls.key
  tls.key: {{ .Values.tls.key | quote }}
