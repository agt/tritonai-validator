apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "pod-security-webhook.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "pod-security-webhook.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "pod-security-webhook.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "pod-security-webhook.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "pod-security-webhook.fullname" . }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: webhook
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8443
              name: https
          env:
            - name: LOG_LEVEL
              value: {{ .Values.logLevel | quote }}
            - name: ANNOTATION_PREFIX
              value: {{ .Values.annotationPrefix | quote }}
            - name: WEBHOOK_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POLICY_INDEX_CONFIGMAP
              value: {{ .Values.policyIndexConfigmap | quote }}
          volumeMounts:
            - name: tls
              mountPath: /tls
              readOnly: true
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8443
              scheme: HTTPS
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8443
              scheme: HTTPS
            initialDelaySeconds: 3
            periodSeconds: 5
      volumes:
        - name: tls
          secret:
            secretName: {{ include "pod-security-webhook.tlsSecretName" . }}
