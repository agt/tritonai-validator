---
# Namespaced Role: read ConfigMaps in the webhook's own namespace for policy lookup.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "pod-security-webhook.fullname" . }}-configmap-reader
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "pod-security-webhook.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "pod-security-webhook.fullname" . }}-configmap-reader
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "pod-security-webhook.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "pod-security-webhook.fullname" . }}
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: {{ include "pod-security-webhook.fullname" . }}-configmap-reader
  apiGroup: rbac.authorization.k8s.io

---
# The webhook needs read access to Namespace objects to fetch security annotations.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Values.rbac.clusterRoleName }}
  labels:
    {{- include "pod-security-webhook.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Values.rbac.clusterRoleName }}
  labels:
    {{- include "pod-security-webhook.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "pod-security-webhook.fullname" . }}
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: ClusterRole
  name: {{ .Values.rbac.clusterRoleName }}
  apiGroup: rbac.authorization.k8s.io
