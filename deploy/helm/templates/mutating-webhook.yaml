# MutatingWebhookConfiguration — the API server calls /mutate for every Pod
# CREATE/UPDATE before running the validating webhook.  The mutator patches
# pods toward compliance using ../default.* namespace
# annotations; the validating webhook then performs the final accept/reject.
#
# ORDERING NOTE: Kubernetes runs mutating webhooks before validating webhooks.
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: {{ include "pod-security-webhook.fullname" . }}
  labels:
    {{- include "pod-security-webhook.labels" . | nindent 4 }}
  {{- if .Values.tls.certManagerAnnotation }}
  annotations:
    cert-manager.io/inject-ca-from: {{ .Values.tls.certManagerAnnotation | quote }}
  {{- end }}
webhooks:
- name: mutate.{{ include "pod-security-webhook.fullname" . }}.local
  admissionReviewVersions: ["v1"]
  sideEffects: None
  # Allow pods through even if the webhook is temporarily unavailable.
  # The validating webhook (failurePolicy: Fail) will still block non-
  # compliant pods; the mutating webhook being down only means defaults
  # won't be applied automatically.
  failurePolicy: {{ .Values.webhook.mutating.failurePolicy }}
  timeoutSeconds: {{ .Values.webhook.mutating.timeoutSeconds }}
  clientConfig:
    service:
      name: {{ include "pod-security-webhook.fullname" . }}
      namespace: {{ .Release.Namespace }}
      path: /mutate
      port: 443
    caBundle: {{ .Values.tls.caBundle | quote }}
  rules:
    - apiGroups: [""]
      apiVersions: ["v1"]
      operations: ["CREATE", "UPDATE"]
      resources: ["pods"]
      scope: "Namespaced"
  namespaceSelector:
    matchExpressions:
      - key: kubernetes.io/metadata.name
        operator: NotIn
        values:
          - {{ .Release.Namespace | quote }}
          {{- range .Values.webhook.excludedNamespaces }}
          - {{ . | quote }}
          {{- end }}
      - key: mutator.{{ .Values.annotationPrefix }}
        operator: In
        values:
          - enabled
  # Only mutate pods that do not yet have the webhook's own annotation
  # (prevents re-mutation of already-processed pods on UPDATE).
  objectSelector:
    matchExpressions:
      - key: mutate.{{ include "pod-security-webhook.fullname" . }}.local/mutated
        operator: DoesNotExist
